<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manager Console | TimeHub Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800;900&family=Prompt:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', 'Prompt', sans-serif; 
            background: #f1f5f9;
            color: #1e293b;
            -webkit-tap-highlight-color: transparent;
            font-weight: 900;
        }
        .font-black { font-weight: 900 !important; }
        .glass-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }
        .menu-tab.active {
            background: #1e293b;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .emp-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .emp-card:active { transform: scale(0.98); }
        input:focus { border-color: #4f46e5; outline: none; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .stat-badge {
            font-weight: 900;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        /* สำหรับปุ่มบันทึกที่ลอยอยู่ */
        .safe-area-bottom { padding-bottom: calc(100px + env(safe-area-inset-bottom)); }
    </style>
</head>
<body class="min-h-screen safe-area-bottom font-black">

    <!-- 🛡️ Authorization Guard (เฉพาะ Admin/Manager) -->
    <div id="auth-guard" class="hidden fixed inset-0 bg-slate-50 z-[200] flex flex-col items-center justify-center p-6 text-center">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-200 max-w-sm w-full font-black">
            <div class="w-24 h-24 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="shield-x" class="w-12 h-12"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-2 uppercase italic text-rose-600">เข้าถึงไม่ได้</h2>
            <p class="text-slate-500 mb-8 font-bold leading-relaxed text-sm">หน้านี้เฉพาะแอดมินหรือผู้จัดการเท่านั้น</p>
            <button onclick="location.href='Main_Hub.html'" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2">
                <i data-lucide="home" class="w-5 h-5"></i> กลับหน้าหลัก
            </button>
        </div>
    </div>

    <!-- 🏠 Top Nav -->
    <header class="sticky top-0 z-50 glass-header px-4 h-20 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-indigo-600 rounded-[1.3rem] flex items-center justify-center text-white shadow-lg">
                <i data-lucide="shield-check" class="w-6 h-6"></i>
            </div>
            <div class="text-left font-black">
                <h1 class="text-lg font-black text-slate-800 leading-none uppercase italic">MANAGER<span class="text-indigo-600">CONSOLE</span></h1>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1 italic">Server-Side Sync v56</p>
            </div>
        </div>
        <button onclick="location.href='Main_Hub.html'" class="flex items-center gap-2 bg-white border border-slate-200 px-4 py-2.5 rounded-2xl text-slate-600 font-black text-xs shadow-sm active:scale-90 transition-transform">
            <i data-lucide="home" class="w-4 h-4"></i>
            <span>HOME</span>
        </button>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6 font-black">
        
        <!-- Tab Switching -->
        <div class="bg-slate-200/60 p-1.5 rounded-[2rem] flex gap-1 font-black">
            <button onclick="switchTab('audit')" id="btn-tab-audit" class="menu-tab active flex-1 py-4 rounded-[1.8rem] font-black text-[11px] transition-all uppercase tracking-widest">
                Audit & สรุปผล
            </button>
            <button onclick="switchTab('petitions')" id="btn-tab-petitions" class="menu-tab flex-1 py-4 rounded-[1.8rem] font-black text-[11px] transition-all text-slate-500 uppercase tracking-widest relative">
                คำร้องรออนุมัติ
                <span id="badge-petitions" class="hidden absolute top-2 right-2 w-5 h-5 bg-rose-500 text-white text-[9px] flex items-center justify-center rounded-full border-2 border-white">0</span>
            </button>
        </div>

        <!-- 📊 Audit Section -->
        <section id="section-audit" class="space-y-5 font-black">
            <!-- ตัวเลือกวันที่ -->
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-100 space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5 font-black">
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 italic">วันเริ่มต้น</label>
                        <input type="date" id="start-date" class="w-full bg-slate-50 border border-slate-100 rounded-2xl p-4 text-sm font-black outline-none focus:bg-white transition-all shadow-inner">
                    </div>
                    <div class="space-y-1.5 font-black">
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 italic">วันสิ้นสุด</label>
                        <input type="date" id="end-date" class="w-full bg-slate-50 border border-slate-100 rounded-2xl p-4 text-sm font-black outline-none focus:bg-white transition-all shadow-inner">
                    </div>
                </div>
                <button onclick="syncAndCalculate()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-3 hover:bg-indigo-700 active:scale-95 transition-all shadow-xl shadow-indigo-100 uppercase tracking-widest text-xs italic">
                    <i data-lucide="refresh-cw" class="w-5 h-5" id="loader-icon"></i>
                    Sync Data จาก Google Sheets
                </button>
            </div>

            <!-- พื้นที่แสดงกระดานพนักงาน -->
            <div id="audit-board" class="space-y-4 font-black">
                <div class="text-center py-24 opacity-20 font-black">
                    <i data-lucide="database-zap" class="w-20 h-20 mx-auto mb-4 text-indigo-400"></i>
                    <p class="font-black uppercase tracking-[0.2em] text-[10px] italic">ระบบพร้อมดึงสรุปผลจากชีท</p>
                </div>
            </div>

            <!-- ปุ่มบันทึก -->
            <div id="save-area" class="hidden fixed bottom-6 left-0 right-0 px-4 z-40">
                <button onclick="submitAuditAll()" class="max-w-md mx-auto w-full bg-emerald-600 text-white py-5 rounded-[2rem] font-black shadow-2xl flex items-center justify-center gap-3 active:scale-95 transition-all uppercase tracking-widest text-sm italic">
                    <i data-lucide="cloud-upload" class="w-6 h-6"></i>
                    บันทึกข้อมูล Audit ลง Sheet
                </button>
            </div>
        </section>

        <!-- 📝 Petitions Section -->
        <section id="section-petitions" class="hidden space-y-4 font-black">
            <div id="petition-list" class="space-y-4 font-black">
                 <p class="text-center py-20 opacity-20 font-black uppercase text-xs italic italic">ไม่มีคำร้องรอนุมัติ</p>
            </div>
        </section>

    </main>

    <!-- ⏳ Global Loader -->
    <div id="global-loader" class="hidden fixed inset-0 bg-white/70 backdrop-blur-md z-[300] flex flex-col items-center justify-center font-black">
        <div class="w-16 h-16 border-[10px] border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-6 font-black text-indigo-600 uppercase tracking-widest text-sm italic">Requesting Sheet Calc...</p>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxvProkNuSUhJSGgO2M94x_ybX_S-9ZtRx75RsBKIMQgmuSw23P_-7z8XPAflKMq6XR9g/exec';

        window.onload = function() {
            lucide.createIcons();
            const role = (localStorage.getItem('user_role') || '').toLowerCase();
            if (role !== 'admin' && role !== 'manager') {
                document.getElementById('auth-guard').classList.remove('hidden');
            }
            
            // ตั้งค่าวันที่เริ่มต้นเป็นต้นเดือนปัจจุบัน
            const now = new Date();
            document.getElementById('start-date').value = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0,10);
            document.getElementById('end-date').value = now.toISOString().slice(0,10);
        };

        function switchTab(tab) {
            document.getElementById('section-audit').classList.toggle('hidden', tab !== 'audit');
            document.getElementById('section-petitions').classList.toggle('hidden', tab !== 'petitions');
            document.querySelectorAll('.menu-tab').forEach(b => b.classList.toggle('active', b.id.includes(tab)));
        }

        // 🚀 🆕 หัวใจสำคัญ: ดึงสรุปผลที่คำนวณแล้วจากชีทโดยตรง
        async function syncAndCalculate() {
            const startStr = document.getElementById('start-date').value;
            const endStr = document.getElementById('end-date').value;
            if(!startStr || !endStr) return alert('กรุณาเลือกวันที่');

            toggleLoader(true);
            document.getElementById('loader-icon').classList.add('animate-spin');

            try {
                // เรียกใช้ API ใหม่ที่ให้หลังบ้าน (ชีท) คำนวณให้เสร็จ
                const response = await fetch(`${API_URL}?action=GET_CALC_SUMMARY&start=${startStr}&end=${endStr}`);
                const data = await response.json();

                if (!data || data.length === 0) {
                    alert("ไม่พบข้อมูลพนักงานในช่วงนี้");
                    renderAudit([]);
                } else {
                    renderAudit(data);
                    // ดึงคำร้องเพิ่ม (ถ้าต้องการดึงคำร้องไปพร้อมกัน ให้ดึง Action นี้ด้วย)
                    fetchPetitions();
                }
            } catch (e) {
                alert('ข้อผิดพลาด: ' + e.message);
            } finally {
                toggleLoader(false);
                document.getElementById('loader-icon').classList.remove('animate-spin');
            }
        }

        async function fetchPetitions() {
            try {
                // ดึงคำร้องผ่าน Action เดิมที่คุณมีอยู่แล้วใน Backend
                const res = await fetch(`${API_URL}?action=GET_MANAGER_DASHBOARD`); 
                const data = await res.json();
                renderPetitions(data.pendingPetitions || []);
            } catch (e) { console.error("Petitions load failed"); }
        }

        function renderAudit(items) {
            const board = document.getElementById('audit-board');
            if(items.length === 0) {
                board.innerHTML = '<p class="text-center py-20 font-black opacity-20 italic">ไม่พบรายชื่อพนักงานในรอบนี้</p>';
                document.getElementById('save-area').classList.add('hidden');
                return;
            }

            board.innerHTML = items.map(emp => `
                <div class="bg-white rounded-[2.8rem] p-7 shadow-xl border border-slate-50 flex flex-col gap-6 emp-card shadow-slate-200/50" 
                     data-id="${emp.empId}" data-name="${emp.name}" data-days="${emp.workDays}" data-late="${emp.lateCount}" data-ot="${emp.ot}">
                    
                    <div class="flex justify-between items-start font-black">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 bg-indigo-600 text-white rounded-[1.5rem] flex items-center justify-center font-black text-xl uppercase italic shadow-lg shadow-indigo-100">
                                ${emp.name ? emp.name.charAt(0) : '?'}
                            </div>
                            <div class="text-left font-black">
                                <h3 class="font-black text-slate-800 text-lg leading-none uppercase italic">${emp.name}</h3>
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-1.5">${emp.empId}</p>
                            </div>
                        </div>
                        <div class="text-right flex flex-col items-end gap-2 font-black">
                            <div class="flex gap-2 font-black">
                                <span class="stat-badge bg-slate-900 text-white shadow-lg shadow-slate-200 italic">มา ${emp.workDays} วัน</span>
                                <span class="stat-badge bg-rose-600 text-white shadow-lg shadow-rose-100 italic">สาย ${emp.lateCount} ครั้ง</span>
                            </div>
                            <span class="text-[10px] font-black text-indigo-500 uppercase tracking-wider italic">OT รวม: ${emp.ot} ชม.</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 font-black">
                        <div class="space-y-1.5">
                            <label class="text-[8px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Audit short</label>
                            <input type="text" class="input-audit-short w-full bg-slate-50 border border-slate-100 rounded-2xl p-4 text-xs font-black outline-none focus:bg-white focus:border-indigo-500 transition-all shadow-inner" placeholder="...">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-[8px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">จำนวนเงินเบิก</label>
                            <input type="text" class="input-withdraw w-full bg-slate-50 border border-slate-100 rounded-2xl p-4 text-xs font-black outline-none focus:bg-white focus:border-indigo-500 transition-all shadow-inner" placeholder="...">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-[8px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">หักสินค้าอื่นๆ</label>
                            <input type="text" class="input-deduction w-full bg-slate-50 border border-slate-100 rounded-2xl p-4 text-xs font-black outline-none focus:bg-white focus:border-indigo-500 transition-all shadow-inner" placeholder="...">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-[8px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">เงินขาดหน้าเครื่อง</label>
                            <input type="text" class="input-counter w-full bg-slate-50 border border-slate-100 rounded-2xl p-4 text-xs font-black outline-none focus:bg-white focus:border-indigo-500 transition-all shadow-inner" placeholder="...">
                        </div>
                    </div>
                </div>
            `).join('');
            document.getElementById('save-area').classList.remove('hidden');
            lucide.createIcons();
        }

        async function submitAuditAll() {
            if(!confirm('ยืนยันการบันทึก Audit ทั้งหมดลง Sheet?')) return;
            toggleLoader(true);
            const start = document.getElementById('start-date').value;
            const end = document.getElementById('end-date').value;
            const payload = Array.from(document.querySelectorAll('.emp-card')).map(card => ({
                empId: card.dataset.id, name: card.dataset.name, workDays: card.dataset.days, lateCount: card.dataset.late, ot: card.dataset.ot,
                auditShort: card.querySelector('.input-audit-short').value || "-",
                withdrawAmount: card.querySelector('.input-withdraw').value || "-",
                otherDeduction: card.querySelector('.input-deduction').value || "-",
                counterShort: card.querySelector('.input-counter').value || "-"
            }));

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'SAVE_BULK_SUMMARY', cycle: `${start} ถึง ${end}`, payload: payload })
                });
                const data = await res.json();
                if(data.success) alert('บันทึกข้อมูล Audit สำเร็จแล้ว!');
            } catch (e) { alert('เกิดข้อผิดพลาดในการบันทึก'); }
            finally { toggleLoader(false); }
        }

        function renderPetitions(items) {
            const container = document.getElementById('petition-list');
            document.getElementById('badge-petitions').innerText = items.length;
            document.getElementById('badge-petitions').classList.toggle('hidden', items.length === 0);
            
            if(items.length === 0) {
                container.innerHTML = '<div class="text-center py-20 opacity-20 font-black uppercase text-xs italic">ไม่มีคำร้องรอนุมัติ</div>';
                return;
            }

            container.innerHTML = items.map(p => `
                <div class="bg-white rounded-[2.5rem] p-7 border border-slate-100 shadow-xl space-y-5 font-black">
                    <div class="flex justify-between">
                        <div class="text-left">
                            <span class="px-3 py-1 bg-amber-100 text-amber-700 rounded-full text-[9px] font-black uppercase tracking-widest italic">${p.Type || 'Petition'}</span>
                            <h3 class="font-black text-slate-800 text-lg leading-tight mt-2 uppercase italic italic">${p.Name}</h3>
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${p.Employee_ID || p.empId}</p>
                        </div>
                        <p class="text-[9px] font-black text-slate-400 italic">${p.Date}</p>
                    </div>
                    <div class="bg-slate-50 p-5 rounded-[1.8rem] border border-slate-100 font-black italic text-left"><p class="text-xs text-slate-600 leading-relaxed font-black">"${p.Reason || p.reason}"</p></div>
                    <div class="flex gap-2 font-black">
                        <button onclick="approvePetition('${p.rowIndex}', 'Rejected')" class="flex-1 py-4 rounded-2xl border-2 border-rose-100 text-rose-500 font-black text-xs uppercase italic tracking-widest">ไม่อนุมัติ</button>
                        <button onclick="approvePetition('${p.rowIndex}', 'Approved')" class="flex-1 py-4 rounded-2xl bg-slate-900 text-white font-black text-xs uppercase shadow-xl italic tracking-widest">อนุมัติ</button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function approvePetition(rowIndex, status) {
            const note = prompt('ระบุหมายเหตุการอนุมัติ:', '-');
            if (note === null) return;
            toggleLoader(true);
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'APPROVE_PETITION', rowIndex, status, managerNote: note })
                });
                syncAndCalculate();
            } catch (e) { alert('Error updating petition'); toggleLoader(false); }
        }

        function toggleLoader(show) { document.getElementById('global-loader').classList.toggle('hidden', !show); }
    </script>
</body>
</html>
