<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Employee Portal - TimeHub Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', 'Prompt', sans-serif; 
            background-color: #f8fafc; 
            color: #1e293b; 
            -webkit-tap-highlight-color: transparent;
        }
        .glass-header { 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            border-bottom-left-radius: 3rem; 
            border-bottom-right-radius: 3rem; 
        }
        .tab-active { @apply bg-slate-900 text-white shadow-lg scale-105; }
        .card-animate { animation: slideUp 0.4s ease-out forwards; opacity: 0; }
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body class="min-h-screen pb-32">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const API_URL = 'https://script.google.com/macros/s/AKfycbxvProkNuSUhJSGgO2M94x_ybX_S-9ZtRx75RsBKIMQgmuSw23P_-7z8XPAflKMq6XR9g/exec';

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        function App() {
            const [view, setView] = useState('history'); 
            const [attendance, setAttendance] = useState([]);
            const [petitions, setPetitions] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [resolvedEmpId, setResolvedEmpId] = useState(localStorage.getItem('user_id'));

            const now = new Date();
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
            const today = now.toISOString().split('T')[0];
            const [startDate, setStartDate] = useState(firstDay);
            const [endDate, setEndDate] = useState(today);

            const empName = localStorage.getItem('user_name') || 'พนักงาน';

            // --- 🚀 ฟังก์ชันพิเศษ: ค้นหารหัสพนักงานจากชื่อ (แก้ปัญหา Login ไม่ส่ง ID) ---
            const resolveIdByName = useCallback(async (name) => {
                try {
                    const res = await fetch(`${API_URL}?action=GET_EMPLOYEES&t=${Date.now()}`);
                    const emps = await res.json();
                    const match = emps.find(e => {
                        const eName = (e['ชื่อเล่น'] || e['Nickname'] || e['ชื่อ-นามสกุล'] || "").trim();
                        return eName === name.trim();
                    });
                    if (match) {
                        const foundId = match['รหัสพนักงาน'] || match['Employee_ID'];
                        localStorage.setItem('user_id', foundId); // บันทึกไว้ใช้ครั้งหน้า
                        setResolvedEmpId(foundId);
                        return foundId;
                    }
                    return null;
                } catch (e) {
                    console.error("ID Resolve Error", e);
                    return null;
                }
            }, []);

            const fetchAllData = useCallback(async (id) => {
                setLoading(true);
                setError(null);
                try {
                    const [resAttendance, resPetitions] = await Promise.all([
                        fetch(`${API_URL}?action=GET_MY_HISTORY&empId=${id}&t=${Date.now()}`).then(r => r.json()),
                        fetch(`${API_URL}?action=GET_MY_PETITIONS&empId=${id}&t=${Date.now()}`).then(r => r.json())
                    ]);
                    setAttendance(Array.isArray(resAttendance) ? resAttendance : (resAttendance.data || []));
                    setPetitions(Array.isArray(resPetitions) ? resPetitions : (resPetitions.data || []));
                } catch (e) {
                    setError("การเชื่อมต่อฐานข้อมูลขัดข้อง");
                } finally {
                    setLoading(false);
                }
            }, []);

            useEffect(() => {
                const init = async () => {
                    let currentId = resolvedEmpId;
                    
                    // ถ้าไม่มี ID แต่มีชื่อ ให้พยายามหา ID
                    if (!currentId && empName !== 'พนักงาน') {
                        setLoading(true);
                        currentId = await resolveIdByName(empName);
                    }

                    if (!currentId) {
                        setLoading(false);
                        setError("ไม่พบรหัสพนักงานในระบบ โปรดล็อกอินใหม่อีกครั้ง");
                        return;
                    }

                    fetchAllData(currentId);
                };
                init();
            }, [resolvedEmpId, empName, resolveIdByName, fetchAllData]);

            const getVal = (item, key) => {
                if (!item) return "";
                const target = Object.keys(item).find(k => k.trim() === key.trim());
                return target ? item[target] : "";
            };

            const parseDate = (d) => {
                if (!d) return null;
                const s = String(d).split('T')[0].trim();
                const p = s.includes('-') ? s.split('-') : s.split('/');
                if (p.length < 3) return null;
                let y = parseInt(p[0]), m = parseInt(p[1])-1, day = parseInt(p[2]);
                if (String(p[0]).length < 4) { day = parseInt(p[0]); m = parseInt(p[1])-1; y = parseInt(p[2]); }
                if (y > 2400) y -= 543;
                return new Date(y, m, day, 0, 0, 0, 0);
            };

            const filteredAttendance = useMemo(() => {
                const s = new Date(startDate).setHours(0,0,0,0);
                const e = new Date(endDate).setHours(23,59,59,999);
                return attendance.filter(item => {
                    const d = parseDate(getVal(item, 'วันที่'));
                    return d && d.getTime() >= s && d.getTime() <= e;
                });
            }, [attendance, startDate, endDate]);

            const stats = useMemo(() => {
                const uniqueDays = new Set(filteredAttendance.map(i => parseDate(getVal(i, 'วันที่'))?.toDateString()).filter(Boolean)).size;
                const totalLate = filteredAttendance.reduce((sum, item) => {
                    const lateMins = String(getVal(item, 'สาย(นาที)')).replace(/[^0-9]/g, '');
                    return sum + (parseInt(lateMins) || 0);
                }, 0);
                return { days: uniqueDays, lateMins: totalLate };
            }, [filteredAttendance]);

            const handleSubmitPetition = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const payload = { 
                    action: 'SUBMIT_PETITION', 
                    empId: resolvedEmpId, 
                    name: empName, 
                    date: formData.get('date'), 
                    type: formData.get('type'), 
                    reason: formData.get('reason') 
                };
                setLoading(true);
                try {
                    await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    setTimeout(() => { 
                        alert("✅ ส่งคำร้องเรียบร้อยแล้ว"); 
                        setView('petition'); 
                        fetchAllData(resolvedEmpId); 
                    }, 800);
                } catch (e) { 
                    alert("❌ ส่งข้อมูลไม่สำเร็จ"); 
                    setLoading(false); 
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen relative overflow-x-hidden">
                    <header className="glass-header pt-12 pb-10 px-6 text-white shadow-2xl relative overflow-hidden">
                        <div className="flex justify-between items-start mb-8 relative z-10">
                            <button onClick={() => window.location.href='Main_Hub.html'} className="p-3 bg-white/10 rounded-2xl backdrop-blur-md border border-white/20 active:scale-95 transition-all">
                                <Icon name="home" />
                            </button>
                            <div className="text-right">
                                <h1 className="text-2xl font-black italic tracking-tighter uppercase leading-none">Employee Portal</h1>
                                <p className="text-[10px] font-bold text-blue-400 uppercase tracking-widest mt-2 italic">
                                    {empName} ({resolvedEmpId || 'ค้นหารหัส...'})
                                </p>
                            </div>
                        </div>

                        <div className="grid grid-cols-3 gap-3 relative z-10 font-bold">
                            <div className="bg-white/5 border border-white/10 p-4 rounded-3xl text-center backdrop-blur-sm">
                                <span className="text-[8px] uppercase text-slate-400 block mb-1">วันทำงาน</span>
                                <span className="text-2xl italic tracking-tight">{stats.days}</span>
                            </div>
                            <div className="bg-rose-500/10 border border-rose-500/20 p-4 rounded-3xl text-center backdrop-blur-sm">
                                <span className="text-[8px] uppercase text-rose-300 block mb-1">สายสะสม</span>
                                <span className="text-2xl italic tracking-tight text-rose-400">{stats.lateMins}</span>
                            </div>
                            <div className="bg-emerald-500/10 border border-emerald-500/20 p-4 rounded-3xl text-center backdrop-blur-sm">
                                <span className="text-[8px] uppercase text-emerald-300 block mb-1">คำร้อง</span>
                                <span className="text-2xl italic tracking-tight text-emerald-400">{petitions.length}</span>
                            </div>
                        </div>
                    </header>

                    <main className="px-5 -mt-6 relative z-20">
                        <div className="flex bg-white p-1.5 rounded-full shadow-xl border border-slate-100 mb-8 max-w-[280px] mx-auto sticky top-4 z-50">
                            <button onClick={() => setView('history')} className={`flex-1 py-3 rounded-full text-[10px] font-black uppercase tracking-widest transition-all ${view === 'history' ? 'tab-active' : 'text-slate-400'}`}>ประวัติเข้างาน</button>
                            <button onClick={() => setView('petition')} className={`flex-1 py-3 rounded-full text-[10px] font-black uppercase tracking-widest transition-all ${view === 'petition' ? 'tab-active' : 'text-slate-400'}`}>สถานะคำร้อง</button>
                        </div>

                        {loading ? (
                            <div className="py-24 text-center">
                                <div className="inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                                <p className="text-[10px] font-black uppercase text-slate-400 tracking-widest animate-pulse italic">กำลังซิงค์ข้อมูลพนักงาน...</p>
                            </div>
                        ) : error ? (
                            <div className="py-20 text-center bg-white rounded-[3rem] border border-rose-100 p-10 shadow-lg card-animate">
                                <Icon name="alert-circle" size={56} className="mx-auto text-rose-400 mb-4" />
                                <h3 className="text-lg font-black text-slate-800 mb-2 uppercase italic">ไม่พบข้อมูลพนักงาน</h3>
                                <p className="text-xs font-bold text-slate-400 mb-8 leading-relaxed italic">{error}</p>
                                <button onClick={() => window.location.href='index.html'} className="w-full py-5 bg-slate-900 text-white rounded-[2rem] text-[11px] font-black uppercase tracking-widest active:scale-95 shadow-xl">
                                    กลับหน้า Login
                                </button>
                            </div>
                        ) : (
                            <>
                                {view === 'history' && (
                                    <div className="space-y-6">
                                        <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-4">
                                            <div className="flex items-center gap-2 mb-2"><Icon name="filter" size={14} className="text-blue-500" /><h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">กรองวันที่</h3></div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none text-xs font-bold text-blue-600" />
                                                <input type="date" value={endDate} onChange={(e) => setEndDate(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none text-xs font-bold text-blue-600" />
                                            </div>
                                        </div>

                                        <div className="space-y-3">
                                            {filteredAttendance.length > 0 ? filteredAttendance.map((item, idx) => {
                                                const time = getVal(item, 'เวลาเช็คอิน') || getVal(item, 'เวลา');
                                                const dateStr = getVal(item, 'วันที่');
                                                const status = getVal(item, 'สถานะ');
                                                const late = parseInt(getVal(item, 'สาย(นาที)')) || 0;
                                                return (
                                                    <div key={idx} className="bg-white p-5 rounded-[2.5rem] shadow-sm border border-slate-100 flex justify-between items-center card-animate" style={{ animationDelay: `${idx * 0.05}s` }}>
                                                        <div className="space-y-1">
                                                            <div className="flex items-center gap-2">
                                                                <span className={`px-2 py-0.5 rounded-lg text-[8px] font-black uppercase ${late > 0 ? 'bg-rose-50 text-rose-600' : 'bg-emerald-50 text-emerald-600'}`}>
                                                                    {status === 'CHECK_IN' ? 'เข้างาน' : 'ออกงาน'} {late > 0 ? `(สาย ${late}น.)` : ''}
                                                                </span>
                                                                <span className="text-[9px] font-black text-slate-300 italic">{dateStr}</span>
                                                            </div>
                                                            <h4 className="font-black text-slate-700 text-lg tracking-tight">{time} น.</h4>
                                                        </div>
                                                        <Icon name="check-circle" size={18} className="text-slate-200" />
                                                    </div>
                                                );
                                            }) : <div className="py-20 text-center opacity-40 italic text-xs">ไม่พบข้อมูล</div>}
                                        </div>
                                    </div>
                                )}

                                {view === 'petition' && (
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center px-2 mb-2"><h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">คำร้องของฉัน</h3><button onClick={() => setView('form')} className="flex items-center gap-2 bg-blue-600 text-white px-5 py-2.5 rounded-full text-[9px] font-black uppercase shadow-lg shadow-blue-200">สร้างใหม่</button></div>
                                        <div className="space-y-3">
                                            {petitions.length > 0 ? petitions.map((p, idx) => (
                                                <div key={idx} className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 card-animate">
                                                    <div className="flex justify-between items-start mb-4"><span className={`px-3 py-1 rounded-full text-[8px] font-black uppercase ${p.Status === 'Approved' ? 'bg-emerald-100 text-emerald-600' : 'bg-orange-100 text-orange-600'}`}>{p.Status || 'Pending'}</span><span className="text-[9px] font-black text-slate-300">📅 {getVal(p, 'Date')}</span></div>
                                                    <h4 className="font-black text-slate-700 uppercase italic text-sm mb-1">{getVal(p, 'Type')}</h4>
                                                    <p className="text-[11px] text-slate-500 italic">"{getVal(p, 'Reason')}"</p>
                                                </div>
                                            )) : <div className="py-20 text-center opacity-30 italic text-xs">ยังไม่มีรายการ</div>}
                                        </div>
                                    </div>
                                )}

                                {view === 'form' && (
                                    <div className="bg-white p-8 rounded-[3rem] shadow-2xl border border-slate-100 max-w-md mx-auto card-animate relative overflow-hidden">
                                        <div className="absolute top-0 right-0 w-24 h-24 bg-blue-50 rounded-full -mr-12 -mt-12 opacity-50"></div>
                                        <h3 className="text-2xl font-black italic uppercase text-slate-900 mb-2">ยื่นคำร้อง</h3>
                                        <p className="text-[10px] text-blue-600 font-black uppercase tracking-[0.2em] mb-8">ส่งข้อมูลถึงผู้พิจารณา</p>
                                        <form onSubmit={handleSubmitPetition} className="space-y-5">
                                            <input type="date" name="date" required className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 outline-none focus:border-blue-500 font-bold text-sm" defaultValue={today} />
                                            <select name="type" required className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 outline-none focus:border-blue-500 font-bold text-sm appearance-none">
                                                <option value="Sick Leave">ลาป่วย</option><option value="Personal Leave">ลากิจ</option><option value="Correction">แก้ไขเวลา</option>
                                            </select>
                                            <textarea name="reason" rows="4" required className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 outline-none focus:border-blue-500 font-bold text-sm italic" placeholder="ระบุเหตุผล..."></textarea>
                                            <div className="flex gap-3 pt-4"><button type="button" onClick={() => setView('history')} className="flex-1 py-4 bg-slate-100 text-slate-400 rounded-2xl font-black uppercase text-xs">ยกเลิก</button><button type="submit" className="flex-[2] py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs shadow-lg shadow-blue-200">ส่งคำร้อง</button></div>
                                        </form>
                                    </div>
                                )}
                            </>
                        )}
                    </main>

                    <div className="fixed bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-5 bg-white/80 backdrop-blur-2xl p-3 rounded-full shadow-[0_20px_50px_rgba(0,0,0,0.15)] border border-white/50 z-[100]">
                        <button onClick={() => setView('history')} className={`w-12 h-12 rounded-full flex items-center justify-center transition-all ${view === 'history' ? 'bg-slate-900 text-white scale-110' : 'text-slate-300'}`}><Icon name="clock" size={24} /></button>
                        <button onClick={() => setView('form')} className={`w-14 h-14 rounded-full flex items-center justify-center bg-blue-600 text-white shadow-xl active:scale-90 ${view === 'form' ? 'ring-4 ring-blue-100' : ''}`}><Icon name="plus" size={28} /></button>
                        <button onClick={() => setView('petition')} className={`w-12 h-12 rounded-full flex items-center justify-center transition-all ${view === 'petition' ? 'bg-slate-900 text-white scale-110' : 'text-slate-300'}`}><Icon name="file-text" size={24} /></button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
