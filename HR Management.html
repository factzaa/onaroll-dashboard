<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HR Management — OnaRoll</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Kanit',sans-serif;background:#f0f4f8;color:#1a2332;min-height:100vh;padding-bottom:74px;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#1a2b5e;--blue:#2979d4;--blue-light:#e8f1fd;--blue-pale:#f0f6ff;
  --surface:#fff;--surface2:#f7fafd;--bg:#f0f4f8;
  --text:#1a2332;--muted:#5a7184;--light:#92a8bb;
  --border:#dde6ef;
  --success:#00897b;--success-bg:#e0f5f2;
  --danger:#e53935;--danger-bg:#fdecea;
  --warn:#f57c00;
  --r:12px;--r-sm:8px;
  --shadow:0 2px 8px rgba(26,43,94,.08);
  --shadow-md:0 6px 24px rgba(26,43,94,.13);
}

/* ══ TOPBAR ══ */
.topbar{background:#fff;border-bottom:2px solid var(--blue);padding:0 16px;height:56px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:60;box-shadow:var(--shadow)}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--navy),var(--blue));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;color:#fff}
.topbar-title{font-size:15px;font-weight:700;color:var(--navy)}
.topbar-sub{font-size:10px;color:var(--muted)}
.topbar-tabs{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:3px;gap:3px;margin-left:auto}
.tab-pill{padding:7px 14px;border-radius:6px;border:none;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;color:var(--muted);background:transparent;white-space:nowrap}
.tab-pill.active{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(41,121,212,.3)}
.btn-icon{width:36px;height:36px;border:1px solid var(--border);background:var(--surface2);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;flex-shrink:0}
.btn-icon:active{transform:rotate(180deg);background:var(--blue-light);color:var(--blue)}

/* ══ MAIN ══ */
.main{max-width:900px;margin:0 auto;padding:16px 14px}

/* ══ SECTIONS ══ */
.section{display:none}.section.active{display:block}

/* ══ CARD ══ */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px}
.card:last-child{margin-bottom:0}
.card-header{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:700;color:var(--navy);display:flex;align-items:center;gap:8px}
.card-icon{width:26px;height:26px;border-radius:7px;background:var(--blue-light);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.card-icon.green{background:var(--success-bg)}
.card-icon.dark{background:var(--navy)}
.card-body{padding:16px}

/* ══ FORM FIELDS ══ */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
.form-grid.cols-4{grid-template-columns:1fr 1fr 1fr 1fr}
.field-group{display:flex;flex-direction:column;gap:5px}
.field-group.full{grid-column:1/-1}
.field-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.field-label.green{color:var(--success)}
.field-input{border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px 14px;font-family:inherit;font-size:14px;color:var(--text);background:#fff;width:100%;transition:border-color .2s;-webkit-appearance:none;outline:none}
.field-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(41,121,212,.1)}
.field-input.dark-bg{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.15);color:#fff}
.field-input.dark-bg:focus{border-color:rgba(255,255,255,.4);box-shadow:none}
.field-input.dark-bg option{background:var(--navy);color:#fff}
select.field-input{cursor:pointer}

/* ══ STATUS RADIO ══ */
.radio-group{display:flex;gap:16px;flex-wrap:wrap}
.radio-label{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:13px;font-weight:600;color:rgba(255,255,255,.8)}
.radio-label input{width:17px;height:17px;accent-color:#4caf50;flex-shrink:0}

/* ══ PHOTO UPLOAD ══ */
.photo-wrap{display:flex;flex-direction:column;align-items:center;gap:12px}
.photo-frame{width:130px;height:130px;border-radius:16px;background:var(--surface2);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:all .2s;flex-shrink:0}
.photo-frame:active{border-color:var(--blue);background:var(--blue-light)}
.photo-frame img{width:100%;height:100%;object-fit:cover;display:none}
.photo-frame img.show{display:block}
.photo-upload-icon{display:flex;flex-direction:column;align-items:center;gap:6px}
.photo-upload-icon svg{width:32px;height:32px;color:var(--light)}
.photo-upload-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;text-align:center}
.btn-clear-photo{background:var(--danger-bg);color:var(--danger);border:none;border-radius:20px;padding:5px 14px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;display:none}
.btn-clear-photo.show{display:block}

/* ══ SETTINGS CARD (dark) ══ */
.settings-card{background:linear-gradient(135deg,var(--navy) 0%,#243580 100%);border-radius:var(--r);padding:18px 16px;margin-bottom:14px}
.settings-title{font-size:11px;font-weight:700;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.1)}

/* ══ SUBMIT ══ */
.btn-submit{width:100%;background:var(--blue);color:#fff;border:none;border-radius:var(--r);padding:14px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(41,121,212,.3);transition:all .2s;margin-top:4px}
.btn-submit:active{background:#1565c0;transform:scale(.98)}
.btn-submit:disabled{opacity:.5;pointer-events:none}

/* ══ SEARCH BAR ══ */
.search-bar{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;box-shadow:var(--shadow);margin-bottom:14px}
.search-bar input{flex:1;border:none;font-family:inherit;font-size:14px;color:var(--text);background:transparent;outline:none}
.search-bar input::placeholder{color:var(--light)}
.emp-count{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap}
.emp-count span{color:var(--blue);font-size:14px;font-weight:700}

/* ══ EMPLOYEE GRID ══ */
.emp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.emp-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px}
.emp-card:active{transform:scale(.97);box-shadow:var(--shadow-md);border-color:#b3d4f7}
.emp-avatar{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--navy),var(--blue));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;border:2px solid var(--border)}
.emp-avatar img{width:100%;height:100%;object-fit:cover}
.emp-info{flex:1;min-width:0}
.emp-id{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
.emp-name{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emp-pos{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emp-status{padding:3px 8px;border-radius:20px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;flex-shrink:0;align-self:flex-start}
.status-active{background:var(--success-bg);color:var(--success)}
.status-inactive{background:var(--danger-bg);color:var(--danger)}

/* ══ MODAL ══ */
.modal-overlay{position:fixed;inset:0;background:rgba(10,15,30,.85);backdrop-filter:blur(4px);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:var(--r) var(--r) 0 0;width:100%;max-width:560px;max-height:92vh;display:flex;flex-direction:column;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0}
.modal-hero{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;flex-shrink:0}
.modal-avatar{width:60px;height:60px;border-radius:14px;background:linear-gradient(135deg,var(--navy),var(--blue));display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;border:2px solid var(--border)}
.modal-avatar img{width:100%;height:100%;object-fit:cover;display:none}
.modal-avatar img.show{display:block}
.modal-name{font-size:17px;font-weight:700;color:var(--navy)}
.modal-pos{font-size:12px;color:var(--blue);font-weight:600;margin-top:2px}
.modal-close{width:32px;height:32px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);cursor:pointer;font-size:14px;color:var(--muted);display:flex;align-items:center;justify-content:center;margin-left:auto;flex-shrink:0}
.modal-body{flex:1;overflow-y:auto;padding:16px}
.modal-body::-webkit-scrollbar{width:3px}
.modal-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.detail-chips{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.detail-chip{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px;text-align:center}
.detail-chip.green{background:var(--success-bg);border-color:rgba(0,137,123,.2)}
.dc-label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
.detail-chip.green .dc-label{color:var(--success)}
.dc-val{font-size:13px;font-weight:700;color:var(--text)}
.detail-chip.green .dc-val{color:var(--success)}
.detail-section{margin-bottom:12px}
.detail-section-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.detail-row:last-child{border-bottom:none}
.dr-key{color:var(--muted);font-weight:600}
.dr-val{font-weight:700;color:var(--text);text-align:right;max-width:60%}
.dr-val.blue{color:var(--blue)}
.modal-footer{padding:14px 16px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:10px;flex-shrink:0}
.btn-edit{background:var(--blue);color:#fff;border:none;border-radius:var(--r-sm);padding:12px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer}
.btn-close-modal{background:var(--navy);color:#fff;border:none;border-radius:var(--r-sm);padding:12px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer}

/* ══ TOAST ══ */
.toast{position:fixed;top:66px;left:50%;transform:translateX(-50%);z-index:500;border-radius:var(--r);padding:11px 20px;font-weight:700;font-size:13px;color:#fff;display:flex;align-items:center;gap:7px;box-shadow:var(--shadow-md);opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:90vw}
.toast.show{opacity:1}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}
.toast.info{background:var(--navy)}

/* ══ DESKTOP ══ */
@media(min-width:640px){
  body{padding-bottom:0}
  .main{padding:24px 20px}
  .form-grid{grid-template-columns:1fr 1fr}
  .form-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
  .form-grid.cols-4{grid-template-columns:1fr 1fr 1fr 1fr}
  .emp-grid{grid-template-columns:repeat(3,1fr)}
  .modal-box{border-radius:var(--r);margin:auto}
  .modal-overlay{align-items:center}
  .reg-layout{display:grid;grid-template-columns:180px 1fr;gap:16px;align-items:start}
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ══ TOPBAR ══ -->
<div class="topbar">
  <div class="logo-icon">👥</div>
  <div>
    <div class="topbar-title">HR Management</div>
    <div class="topbar-sub">ระบบจัดการพนักงาน</div>
  </div>
  <div class="topbar-tabs">
    <button class="tab-pill active" id="tab-reg" onclick="switchTab('register')">📝 ลงทะเบียน</button>
    <button class="tab-pill" id="tab-db" onclick="switchTab('database')">🗂️ ฐานข้อมูล</button>
  </div>
  <button class="btn-icon" onclick="fetchEmployees()" title="ซิงค์">
    <svg id="sync-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
  </button>
</div>

<!-- ══ MAIN ══ -->
<div class="main">

  <!-- ─── REGISTER ─── -->
  <div class="section active" id="section-register">

    <form id="hrForm" onsubmit="saveEmployee(event)">

      <!-- Top layout: photo + personal -->
      <div class="reg-layout" style="margin-bottom:14px">

        <!-- Photo Card -->
        <div class="card" style="margin-bottom:0">
          <div class="card-header">
            <div class="card-title"><div class="card-icon">📷</div>รูปโปรไฟล์</div>
            <button type="button" id="btn-clear-photo" onclick="clearPhoto()" class="btn-clear-photo">ลบรูป</button>
          </div>
          <div class="card-body" style="display:flex;justify-content:center">
            <div class="photo-wrap">
              <div class="photo-frame" onclick="document.getElementById('image-input').click()">
                <img id="img-preview">
                <div class="photo-upload-icon" id="upload-placeholder">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/></svg>
                  <div class="photo-upload-label">แตะเพื่ออัพโหลด</div>
                </div>
                <input type="file" id="image-input" accept="image/*" class="" style="display:none" onchange="handleImage(this)">
              </div>
            </div>
          </div>
        </div>

        <!-- Personal Info Card -->
        <div class="card" style="margin-bottom:0">
          <div class="card-header">
            <div class="card-title"><div class="card-icon">👤</div>ข้อมูลส่วนตัว</div>
          </div>
          <div class="card-body">
            <div class="form-grid" style="margin-bottom:12px">
              <div class="field-group">
                <label class="field-label">รหัสพนักงาน *</label>
                <input type="text" id="f-empId" required class="field-input" placeholder="OAR01">
              </div>
              <div class="field-group">
                <label class="field-label">ชื่อเล่น</label>
                <input type="text" id="f-nickName" class="field-input" placeholder="ชื่อเล่น">
              </div>
            </div>
            <div class="field-group" style="margin-bottom:12px">
              <label class="field-label">ชื่อจริง - นามสกุล *</label>
              <input type="text" id="f-fullName" required class="field-input" placeholder="ชื่อจริง นามสกุล">
            </div>
            <div class="form-grid">
              <div class="field-group">
                <label class="field-label">ตำแหน่งงาน *</label>
                <input type="text" id="f-position" required class="field-input" placeholder="เช่น บาริสต้า">
              </div>
              <div class="field-group">
                <label class="field-label">วันที่เริ่มงาน *</label>
                <input type="date" id="f-startDate" required class="field-input">
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Contact & Banking -->
      <div class="card">
        <div class="card-header">
          <div class="card-title"><div class="card-icon green">💳</div>ข้อมูลติดต่อ & บัญชีธนาคาร</div>
        </div>
        <div class="card-body">
          <div class="form-grid cols-3" style="margin-bottom:12px">
            <div class="field-group">
              <label class="field-label">เบอร์โทรศัพท์</label>
              <input type="tel" id="f-phone" class="field-input" placeholder="0812345678">
            </div>
            <div class="field-group">
              <label class="field-label">Line ID</label>
              <input type="text" id="f-lineId" class="field-input" placeholder="@lineID">
            </div>
            <div class="field-group">
              <label class="field-label">สาขา</label>
              <input type="text" id="f-branch" class="field-input" placeholder="สาขา">
            </div>
          </div>
          <div class="form-grid">
            <div class="field-group">
              <label class="field-label">ธนาคาร</label>
              <input type="text" id="f-bankName" class="field-input" placeholder="เช่น กสิกรไทย">
            </div>
            <div class="field-group">
              <label class="field-label">เลขบัญชีธนาคาร</label>
              <input type="text" id="f-bankAcc" class="field-input" placeholder="xxx-x-xxxxx-x">
            </div>
          </div>
        </div>
      </div>

      <!-- Settings (dark) -->
      <div class="settings-card">
        <div class="settings-title">⚙️ Settings & Permissions</div>
        <div class="form-grid cols-4" style="margin-bottom:14px">
          <div class="field-group">
            <label class="field-label" style="color:rgba(255,255,255,.5)">บทบาท</label>
            <select id="f-role" class="field-input dark-bg">
              <option value="User">User</option>
              <option value="Manager">Manager</option>
              <option value="Admin">Admin</option>
            </select>
          </div>
          <div class="field-group">
            <label class="field-label" style="color:rgba(255,255,255,.5)">รหัส PIN</label>
            <input type="password" id="f-pin" maxlength="6" class="field-input dark-bg" placeholder="••••••">
          </div>
          <div class="field-group">
            <label class="field-label" style="color:rgba(255,255,255,.5)">เวลาเริ่ม</label>
            <input type="time" id="f-startTime" class="field-input dark-bg">
          </div>
          <div class="field-group">
            <label class="field-label" style="color:rgba(255,255,255,.5)">เวลาเลิก</label>
            <input type="time" id="f-endTime" class="field-input dark-bg">
          </div>
        </div>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="status" value="Active" checked>
            <span>🟢 Active (ใช้งาน)</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="status" value="Inactive">
            <span>🔴 Inactive (ลาออก)</span>
          </label>
        </div>
      </div>

      <button type="submit" id="btn-save" class="btn-submit">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        ยืนยันบันทึกข้อมูลพนักงาน
      </button>
    </form>
  </div>

  <!-- ─── DATABASE ─── -->
  <div class="section" id="section-database">
    <div class="search-bar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--light);flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-db" onkeyup="filterDatabase()" placeholder="ค้นหารหัสหรือชื่อพนักงาน...">
      <div class="emp-count">ทั้งหมด <span id="emp-count">0</span> คน</div>
    </div>
    <div class="emp-grid" id="db-list"></div>
  </div>

</div>

<!-- ══ MODAL ══ -->
<div class="modal-overlay" id="modal-detail" onclick="closeModalCheck(event)">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-hero">
      <div class="modal-avatar" id="m-avatar-box">
        <img id="m-img">
        <span id="m-avatar">?</span>
      </div>
      <div>
        <div class="modal-name" id="m-fullName">—</div>
        <div class="modal-pos" id="m-position">—</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="detail-chips">
        <div class="detail-chip"><div class="dc-label">Emp ID</div><div class="dc-val" id="m-empId">—</div></div>
        <div class="detail-chip"><div class="dc-label">ชื่อเล่น</div><div class="dc-val" id="m-nickName">—</div></div>
        <div class="detail-chip green"><div class="dc-label">Status</div><div class="dc-val" id="m-status">—</div></div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">💼 Employment</div>
        <div class="detail-row"><span class="dr-key">เริ่มงาน</span><span class="dr-val" id="m-startDate">—</span></div>
        <div class="detail-row"><span class="dr-key">บทบาท</span><span class="dr-val blue" id="m-role">—</span></div>
        <div class="detail-row"><span class="dr-key">สาขา</span><span class="dr-val" id="m-branch">—</span></div>
        <div class="detail-row"><span class="dr-key">เวลางาน</span><span class="dr-val blue"><span id="m-startTime">—</span> – <span id="m-endTime">—</span></span></div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">📞 Contact & Finance</div>
        <div class="detail-row"><span class="dr-key">โทรศัพท์</span><span class="dr-val" id="m-phone">—</span></div>
        <div class="detail-row"><span class="dr-key">Line ID</span><span class="dr-val" id="m-lineId">—</span></div>
        <div class="detail-row"><span class="dr-key">ธนาคาร</span><span class="dr-val" id="m-bankName">—</span></div>
        <div class="detail-row"><span class="dr-key">เลขบัญชี</span><span class="dr-val" id="m-bankAcc">—</span></div>
      </div>
    </div>
    <div class="modal-footer">
      <button id="btn-edit-trigger" class="btn-edit">✏️ แก้ไขข้อมูล</button>
      <button onclick="closeModal()" class="btn-close-modal">ปิด</button>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxvProkNuSUhJSGgO2M94x_ybX_S-9ZtRx75RsBKIMQgmuSw23P_-7z8XPAflKMq6XR9g/exec';
const IMGBB_KEY = '412005bc434fd396c0f0163133dfa205';

const COL = { ID:0, NAME:1, NICK:2, POS:3, START:4, TEL:5, BANK:6, ACC:7, STAT:8, LINE:9, ROLE:10, BRCH:11, PIN:12, STIME:13, ETIME:14, IMG:15 };

let allEmployees = [], rawImageFile = null, isEditing = false;

window.onload = () => { fetchEmployees(); };

async function fetchEmployees() {
  const icon = document.getElementById('sync-icon');
  icon.style.animation = 'spin .6s linear infinite';
  try {
    const res = await fetch(`${API_URL}?action=GET_EMPLOYEES&t=${Date.now()}`);
    const data = await res.json();
    allEmployees = Array.isArray(data) ? data : [];
    document.getElementById('emp-count').innerText = allEmployees.length;
    renderDatabase();
    showToast('โหลดข้อมูลสำเร็จ', 'success');
  } catch(e) { showToast('โหลดข้อมูลไม่สำเร็จ', 'error'); }
  icon.style.animation = '';
}

function getVal(emp, index) {
  if (!emp) return '-';
  const thaiKeys = ['รหัสพนักงาน','ชื่อ-นามสกุล','ชื่อเล่น','ตำแหน่ง','วันที่เริ่มงาน','เบอร์โทรศัพท์','ธนาคาร','เลขบัญชีธนาคาร','สถานะ','Line_ID','role','branch','pin','start_work_time','end_work_time','รูปภาพพนักงาน'];
  const key = thaiKeys[index];
  if (emp[key] !== undefined && emp[key] !== null) return String(emp[key]).trim();
  if (Array.isArray(emp)) return (emp[index] !== undefined && emp[index] !== null) ? String(emp[index]).trim() : '-';
  return '-';
}

function formatTimeDisplay(val) {
  if (!val || val==='-' || val==='undefined') return '-';
  let s = String(val).trim();
  if (s.includes('T') || s.includes('1899')) {
    const d = new Date(val);
    if (!isNaN(d.getTime())) {
      if (d.getUTCFullYear()===1899) { d.setUTCMinutes(d.getUTCMinutes()-17); d.setUTCSeconds(d.getUTCSeconds()-56); }
      let h = d.getUTCHours()+7; if (h>=24) h-=24;
      return `${String(h).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}`;
    }
  }
  return s.match(/(\d{1,2})[:.](\d{2})/) ? s.replace('.', ':') : s;
}

function safeDateInput(val) {
  if (!val || val==='-') return '';
  const d = new Date(val);
  if (isNaN(d.getTime())) return '';
  let yr = d.getFullYear(); if (yr>2500) yr-=543;
  return `${yr}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function handleImage(input) {
  if (input.files && input.files[0]) {
    rawImageFile = input.files[0];
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.getElementById('img-preview');
      img.src = e.target.result;
      img.classList.add('show');
      document.getElementById('upload-placeholder').style.display = 'none';
      document.getElementById('btn-clear-photo').classList.add('show');
      showToast('📸 อัพโหลดรูปสำเร็จ', 'success');
    };
    reader.readAsDataURL(rawImageFile);
  }
}

function clearPhoto() {
  rawImageFile = null;
  const img = document.getElementById('img-preview');
  img.src = ''; img.classList.remove('show');
  document.getElementById('upload-placeholder').style.display = '';
  document.getElementById('btn-clear-photo').classList.remove('show');
  document.getElementById('image-input').value = '';
}

function switchTab(tab) {
  const isReg = tab === 'register';
  document.getElementById('section-register').classList.toggle('active', isReg);
  document.getElementById('section-database').classList.toggle('active', !isReg);
  document.getElementById('tab-reg').classList.toggle('active', isReg);
  document.getElementById('tab-db').classList.toggle('active', !isReg);
  if (!isReg) renderDatabase();
}

function renderDatabase() {
  const search = document.getElementById('search-db').value.toLowerCase();
  const filtered = allEmployees.filter(e =>
    getVal(e,COL.ID).toLowerCase().includes(search) ||
    getVal(e,COL.NAME).toLowerCase().includes(search) ||
    getVal(e,COL.NICK).toLowerCase().includes(search)
  );
  document.getElementById('db-list').innerHTML = filtered.length === 0
    ? '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#92a8bb;font-size:13px">ไม่พบข้อมูลพนักงาน</div>'
    : filtered.map(e => {
      const id = getVal(e,COL.ID);
      const stat = getVal(e,COL.STAT);
      const img = getVal(e,COL.IMG);
      const nick = getVal(e,COL.NICK);
      const isActive = stat.includes('Active');
      return `<div class="emp-card" onclick="showEmployeeDetail('${id}')">
        <div class="emp-avatar">
          ${img&&img!=='-'?`<img src="${img}" style="width:100%;height:100%;object-fit:cover">`:nick.charAt(0)||'?'}
        </div>
        <div class="emp-info">
          <div class="emp-id">${id}</div>
          <div class="emp-name">${getVal(e,COL.NAME)}</div>
          <div class="emp-pos">${getVal(e,COL.POS)}</div>
        </div>
        <span class="emp-status ${isActive?'status-active':'status-inactive'}">${isActive?'Active':'Inactive'}</span>
      </div>`;
    }).join('');
}

function filterDatabase() { renderDatabase(); }

function showEmployeeDetail(id) {
  const e = allEmployees.find(x => getVal(x,COL.ID) === String(id).trim());
  if (!e) return showToast('ไม่พบข้อมูลพนักงาน', 'error');
  const img = getVal(e,COL.IMG);
  const mImg = document.getElementById('m-img');
  const mAvatar = document.getElementById('m-avatar');
  if (img&&img!=='-') { mImg.src=img; mImg.classList.add('show'); mAvatar.style.display='none'; }
  else { mImg.classList.remove('show'); mAvatar.style.display=''; mAvatar.innerText=getVal(e,COL.NICK).charAt(0)||'?'; }
  document.getElementById('m-fullName').innerText = getVal(e,COL.NAME);
  document.getElementById('m-position').innerText = getVal(e,COL.POS);
  document.getElementById('m-empId').innerText = getVal(e,COL.ID);
  document.getElementById('m-nickName').innerText = getVal(e,COL.NICK);
  document.getElementById('m-status').innerText = getVal(e,COL.STAT);
  document.getElementById('m-phone').innerText = getVal(e,COL.TEL);
  document.getElementById('m-lineId').innerText = getVal(e,COL.LINE);
  document.getElementById('m-bankName').innerText = getVal(e,COL.BANK);
  document.getElementById('m-bankAcc').innerText = getVal(e,COL.ACC);
  document.getElementById('m-role').innerText = getVal(e,COL.ROLE);
  document.getElementById('m-branch').innerText = getVal(e,COL.BRCH);
  document.getElementById('m-startTime').innerText = formatTimeDisplay(getVal(e,COL.STIME));
  document.getElementById('m-endTime').innerText = formatTimeDisplay(getVal(e,COL.ETIME));
  const startD = getVal(e,COL.START);
  const d = new Date(startD);
  document.getElementById('m-startDate').innerText = isNaN(d.getTime()) ? startD : d.toLocaleDateString('th-TH');
  document.getElementById('btn-edit-trigger').onclick = () => fillFormForEdit(e);
  document.getElementById('modal-detail').classList.add('open');
}

function fillFormForEdit(e) {
  isEditing = true; switchTab('register'); closeModal();
  document.getElementById('f-empId').value = getVal(e,COL.ID);
  document.getElementById('f-fullName').value = getVal(e,COL.NAME);
  document.getElementById('f-nickName').value = getVal(e,COL.NICK);
  document.getElementById('f-position').value = getVal(e,COL.POS);
  document.getElementById('f-startDate').value = safeDateInput(getVal(e,COL.START));
  document.getElementById('f-phone').value = getVal(e,COL.TEL);
  document.getElementById('f-lineId').value = getVal(e,COL.LINE);
  document.getElementById('f-branch').value = getVal(e,COL.BRCH);
  document.getElementById('f-bankName').value = getVal(e,COL.BANK);
  document.getElementById('f-bankAcc').value = getVal(e,COL.ACC);
  document.getElementById('f-role').value = getVal(e,COL.ROLE);
  document.getElementById('f-pin').value = getVal(e,COL.PIN);
  document.getElementById('f-startTime').value = formatTimeDisplay(getVal(e,COL.STIME));
  document.getElementById('f-endTime').value = formatTimeDisplay(getVal(e,COL.ETIME));
  document.getElementsByName('status').forEach(r => r.checked = (r.value === getVal(e,COL.STAT)));
  const img = getVal(e,COL.IMG);
  if (img&&img!=='-') {
    const preview = document.getElementById('img-preview');
    preview.src = img; preview.classList.add('show');
    document.getElementById('upload-placeholder').style.display = 'none';
    document.getElementById('btn-clear-photo').classList.add('show');
  } else { clearPhoto(); }
}

function closeModal() { document.getElementById('modal-detail').classList.remove('open'); }
function closeModalCheck(e) { if (e.target.id==='modal-detail') closeModal(); }

async function saveEmployee(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-save');
  const oldText = btn.innerText; btn.disabled = true; btn.innerText = 'กำลังบันทึก...';
  let finalImgUrl = '-';
  if (rawImageFile) {
    const fdImg = new FormData(); fdImg.append('image', rawImageFile);
    try {
      const resImg = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`,{method:'POST',body:fdImg});
      const dataImg = await resImg.json();
      if (dataImg.success) finalImgUrl = dataImg.data.url;
    } catch(err) {}
  } else if (isEditing) {
    const old = allEmployees.find(x => getVal(x,COL.ID) === String(document.getElementById('f-empId').value).trim());
    if (old) finalImgUrl = getVal(old,COL.IMG);
  }
  const data = {
    action:'SAVE_EMPLOYEE',
    empId: document.getElementById('f-empId').value,
    fullName: document.getElementById('f-fullName').value,
    nickName: document.getElementById('f-nickName').value,
    position: document.getElementById('f-position').value,
    startDate: document.getElementById('f-startDate').value,
    phone: document.getElementById('f-phone').value,
    bankName: document.getElementById('f-bankName').value,
    bankAcc: document.getElementById('f-bankAcc').value,
    status: document.querySelector('input[name="status"]:checked').value,
    lineId: document.getElementById('f-lineId').value,
    role: document.getElementById('f-role').value,
    branch: document.getElementById('f-branch').value,
    pin: document.getElementById('f-pin').value,
    startTime: document.getElementById('f-startTime').value,
    endTime: document.getElementById('f-endTime').value,
    image: finalImgUrl
  };
  try {
    await fetch(API_URL,{method:'POST',mode:'no-cors',body:JSON.stringify(data)});
    showToast('✅ บันทึกข้อมูลพนักงานสำเร็จ!', 'success');
    e.target.reset(); clearPhoto(); isEditing = false;
    setTimeout(() => { fetchEmployees(); switchTab('database'); }, 1500);
  } catch(err) {
    showToast('❌ บันทึกไม่สำเร็จ', 'error');
  } finally { btn.disabled = false; btn.innerText = oldText; }
}

function showToast(msg, type='info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(()=>el.classList.remove('show'), 3500);
}
</script>
</body>
</html>
