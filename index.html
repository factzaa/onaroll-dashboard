<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeHub Pro - Official System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', 'Prompt', sans-serif; background: #f4f7fa; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .main-card { background: white; border-radius: 3rem; box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.08); border: 1px solid rgba(226, 232, 240, 0.8); }
        #video-feed, #captured-image { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .btn-disabled { @apply grayscale opacity-40 cursor-not-allowed pointer-events-none; }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 sm:p-8">

    <header class="w-full max-w-md flex justify-between items-center mb-8 animate-in text-left">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-blue-600 rounded-[1.4rem] flex items-center justify-center text-white shadow-xl shadow-blue-100"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="2.5"></path></svg></div>
            <div><h1 class="text-xl font-black text-slate-800 uppercase italic leading-none">TIME<span class="text-blue-600">HUB</span></h1><p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Professional Management</p></div>
        </div>
        <button onclick="toggleAdminLogin()" class="p-3.5 rounded-2xl bg-white border border-slate-100 text-slate-300 hover:text-blue-600 transition-all active:scale-90"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" stroke-width="2.5"></path></svg></button>
    </header>

    <div class="w-full max-w-md main-card p-8 sm:p-12 space-y-10 animate-in text-center">
        <div class="space-y-2"><div id="live-clock" class="text-6xl font-black text-slate-900 tracking-tighter italic">00:00:00</div><p id="live-date" class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em] mt-3">ระบบพร้อมใช้งาน</p></div>
        
        <div class="space-y-4">
            <div id="gps-banner" class="bg-slate-50 border border-slate-100 rounded-full py-3 px-6 flex items-center justify-between shadow-inner">
                <div class="flex items-center gap-2 text-left"><div id="gps-dot" class="w-2.5 h-2.5 rounded-full bg-slate-300 animate-pulse"></div><span id="gps-text" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">ตรวจหาพิกัด...</span></div>
                <button onclick="initLocation()" class="text-[10px] font-bold text-blue-600 uppercase">Refresh</button>
            </div>
            
            <div class="relative w-full aspect-square bg-slate-100 rounded-[2.5rem] overflow-hidden border-4 border-white shadow-lg flex items-center justify-center group cursor-pointer" onclick="takeSnapshot()">
                <video id="video-feed" autoplay playsinline muted></video>
                <img id="captured-image" class="hidden absolute inset-0">
                <div class="absolute inset-0 bg-black/5 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"><span class="text-white text-[10px] font-black uppercase tracking-widest bg-black/40 px-6 py-2 rounded-full backdrop-blur-md">แตะเพื่อถ่ายรูป</span></div>
            </div>
            <div id="retake-container" class="hidden"><button onclick="resetCamera(event)" class="text-[10px] font-bold text-rose-500 uppercase border-b border-rose-200">ถ่ายรูปใหม่ (Retake)</button></div>
        </div>

        <div class="space-y-8 pt-4 border-t border-slate-50">
            <div class="space-y-4 text-center"><label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em]">รหัสพนักงาน (ID)</label><input type="text" id="emp-id" placeholder="ระบุ ID..." class="w-full py-5 rounded-full bg-slate-50 border-2 border-slate-100 outline-none transition-all font-black text-center text-4xl uppercase tracking-wider"></div>
            <div class="flex w-full gap-4">
                <button onclick="handleCheckAction('CHECK_IN')" id="btn-clock-in" class="flex-1 py-6 rounded-full text-white bg-gradient-to-br from-blue-500 to-blue-700 shadow-xl btn-disabled font-black">บันทึกเข้างาน</button>
                <button onclick="handleCheckAction('CHECK_OUT')" id="btn-clock-out" class="flex-1 py-6 rounded-full text-white bg-gradient-to-br from-rose-500 to-rose-700 shadow-xl btn-disabled font-black">บันทึกออกงาน</button>
            </div>
        </div>
    </div>

    <!-- Success Pop-Up -->
    <div id="result-screen" class="fixed inset-0 z-[500] bg-slate-950/90 backdrop-blur-xl hidden flex items-center justify-center p-6 text-center">
        <div class="bg-white w-full max-w-sm rounded-[3.5rem] p-12 space-y-8 shadow-2xl animate-in">
            <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto"><svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="5"/></svg></div>
            <div class="space-y-1"><h2 class="text-3xl font-black text-slate-900" id="res-name">-</h2><p class="text-blue-600 font-bold uppercase tracking-widest text-xs" id="res-status">-</p></div>
            <div id="res-detail" class="p-8 bg-slate-50 rounded-[2.5rem] text-sm font-bold text-slate-500 italic leading-relaxed whitespace-pre-line text-center"></div>
            <button onclick="location.reload()" class="w-full py-5 bg-slate-900 text-white rounded-full font-black uppercase tracking-widest active:scale-95">รับทราบ</button>
        </div>
    </div>

    <!-- Admin Login Modal -->
    <div id="admin-modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-md z-[600] hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 space-y-6 shadow-2xl animate-in text-center">
            <div class="text-center"><h3 class="text-2xl font-black text-slate-800">ผู้ดูแลระบบ</h3><p class="text-xs text-slate-400 font-bold uppercase tracking-wider mt-1">Admin Access Only</p></div>
            <div class="space-y-4">
                <input type="text" id="admin-emp-id" placeholder="Employee ID" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-bold text-center">
                <input type="password" id="admin-pin" placeholder="PIN Code" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-bold text-center">
            </div>
            <div class="flex gap-3">
                <button onclick="toggleAdminLogin()" class="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold">ยกเลิก</button>
                <button onclick="loginToHub()" id="btn-login-hub" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold">เข้าสู่ระบบ</button>
            </div>
        </div>
    </div>

    <canvas id="canvas" style="display:none"></canvas>
    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 z-[1000] px-10 py-5 rounded-full shadow-2xl transition-all duration-500 font-bold text-center min-w-[300px] opacity-0 pointer-events-none translate-y-[-20px]"></div>

    <script>
        const SHOP_LAT = 16.728082, SHOP_LON = 101.292051, RADIUS_LIMIT = 200;
        // 🚀 อัปเดต URL ตามที่คุณแจ้ง
        const API_URL = 'https://script.google.com/macros/s/AKfycbzcRsD5gzvZWoBs2jV3PncNiunIkDPia37Pwf3Y6ZT_mZEPXXtIy0-PVQEIQXSh3_aDCg/exec';
        const IMGBB_KEY = '412005bc434fd396c0f0163133dfa205';
        let userPos = null, capturedBlob = null, stream = null;

        window.onload = () => { updateClock(); initLocation(); startCamera(); };
        function updateClock() { 
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('th-TH', { hour12: false }); 
            setTimeout(updateClock, 1000); 
        }
        function calculateDistance(la1, lo1, la2, lo2) { const R = 6371e3; const φ1 = la1*Math.PI/180, φ2 = la2*Math.PI/180, Δφ = (la2-la1)*Math.PI/180, Δλ = (lo2-lo1)*Math.PI/180; const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2; return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); }
        
        function initLocation() { 
            const dot = document.getElementById('gps-dot'); const text = document.getElementById('gps-text'); 
            const btns = [document.getElementById('btn-clock-in'), document.getElementById('btn-clock-out')];
            
            dot.className = "w-2.5 h-2.5 rounded-full bg-slate-300 animate-pulse";
            text.innerText = "🔍 กำลังหาพิกัด...";

            navigator.geolocation.getCurrentPosition(pos => { 
                userPos = pos.coords; const dist = calculateDistance(userPos.latitude, userPos.longitude, SHOP_LAT, SHOP_LON);
                if(dist <= RADIUS_LIMIT) { 
                    dot.className = "w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]"; text.innerText = "✅ อยู่ในพื้นที่ร้าน"; 
                    btns.forEach(b => b.classList.remove('btn-disabled'));
                } else { 
                    dot.className = "w-2.5 h-2.5 rounded-full bg-rose-500 shadow-[0_0_10px_#f43f5e]"; text.innerText = `❌ นอกพื้นที่ (${Math.round(dist)}ม.)`; 
                    btns.forEach(b => b.classList.add('btn-disabled'));
                }
            }, (err) => {
                // Fallback: หากหาสัญญาณแม่นยำสูงไม่ได้ภายใน 5 วินาที ให้ใช้พิกัดจากเสาสัญญาณ
                navigator.geolocation.getCurrentPosition(p => { userPos = p.coords; }, null, { enableHighAccuracy: false });
                showToast("⚠️ กรุณาอนุญาตสิทธิ์พิกัด", "error");
            }, { enableHighAccuracy: true, timeout: 5000 });
        }

        async function startCamera() { try { stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } }); document.getElementById('video-feed').srcObject = stream; } catch (e) { showToast("⚠️ เปิดกล้องไม่ได้", "error"); } }
        function takeSnapshot() { if(!stream || capturedBlob) return; const video = document.getElementById('video-feed'); const canvas = document.getElementById('canvas'); canvas.width = video.videoWidth; canvas.height = video.videoHeight; const ctx = canvas.getContext('2d'); ctx.translate(canvas.width, 0); ctx.scale(-1, 1); ctx.drawImage(video, 0, 0, canvas.width, canvas.height); canvas.toBlob(blob => { capturedBlob = blob; document.getElementById('captured-image').src = URL.createObjectURL(blob); video.classList.add('hidden'); document.getElementById('captured-image').classList.remove('hidden'); document.getElementById('retake-container').classList.remove('hidden'); showToast("📸 สแกนใบหน้าสำเร็จ"); }, 'image/jpeg', 0.8); }
        function resetCamera(e) { if(e) e.stopPropagation(); capturedBlob = null; document.getElementById('video-feed').classList.remove('hidden'); document.getElementById('captured-image').classList.add('hidden'); document.getElementById('retake-container').classList.add('hidden'); }
        function toggleAdminLogin() { document.getElementById('admin-modal').classList.toggle('hidden'); }

        // 🚀 Helper: หาค่าจากหัวตารางไม่ว่าจะเป็นชื่อไทยหรืออังกฤษ
        function getSmartVal(obj, ...keys) {
            if (!obj) return null;
            for (let k of keys) {
                if (obj[k] !== undefined && obj[k] !== "") return obj[k];
                const foundKey = Object.keys(obj).find(key => key.toLowerCase().replace(/[^a-z0-9ก-๙]/g, '') === k.toLowerCase().replace(/[^a-z0-9ก-๙]/g, ''));
                if (foundKey) return obj[foundKey];
            }
            return null;
        }

        // 🕒 Helper: แปลงเวลาจาก Sheets ให้คำนวณได้
        function parseTime(val) {
            if (!val) return { h: 0, m: 0 };
            try {
                if (typeof val === 'string' && val.includes('T')) {
                    const d = new Date(val);
                    let h = d.getUTCHours() + 7; if (h >= 24) h -= 24;
                    return { h: h, m: d.getUTCMinutes() };
                }
                const parts = String(val).replace('.', ':').split(':');
                return { h: parseInt(parts[0], 10) || 0, m: parseInt(parts[1], 10) || 0 };
            } catch(e) { return { h: 0, m: 0 }; }
        }

        async function handleCheckAction(type) {
            const id = document.getElementById('emp-id').value.trim().toUpperCase();
            if (!id || !capturedBlob) return showToast("⚠️ กรุณากรอก ID และสแกนหน้า", "error");
            const btn = type === 'CHECK_IN' ? document.getElementById('btn-clock-in') : document.getElementById('btn-clock-out');
            const originalText = btn.innerText; btn.disabled = true; btn.innerText = "Processing..."; 

            try {
                // 🚀 ปรับปรุงส่วนดึงข้อมูล (เพิ่ม Cache Buster ป้องกันการเชื่อมต่อล้มเหลว)
                const resEmp = await fetch(`${API_URL}?action=GET_EMPLOYEES&t=${Date.now()}`);
                if (!resEmp.ok) throw new Error("NetErr");
                const emps = await resEmp.json();
                
                const emp = emps.find(e => String(getSmartVal(e, 'รหัสพนักงาน', 'Employee_ID') || "").toUpperCase() === id);
                if (!emp) { showToast("❌ ไม่พบรหัสพนักงาน", "error"); btn.disabled = false; btn.innerText = originalText; return; }

                // 🕒 🛠️ ส่วนคำนวณ สาย และ OT
                const now = new Date();
                let status = "ปกติ", lateMinutes = 0, otHours = 0;
                
                if (type === 'CHECK_IN') {
                    const sched = parseTime(getSmartVal(emp, 'เวลาเริ่มงาน', 'startTime', 'start_work_time'));
                    const workStart = new Date(now); workStart.setHours(sched.h, sched.m, 0, 0);
                    if (now.getTime() > workStart.getTime()) {
                        lateMinutes = Math.floor((now.getTime() - workStart.getTime()) / 60000);
                        if (lateMinutes > 0) status = "สาย";
                    }
                } else {
                    const sched = parseTime(getSmartVal(emp, 'เวลาเลิกงาน', 'endTime', 'end_work_time'));
                    const workEnd = new Date(now); workEnd.setHours(sched.h, sched.m, 0, 0);
                    if (now.getTime() > workEnd.getTime()) {
                        otHours = parseFloat(((now.getTime() - workEnd.getTime()) / 3600000).toFixed(2));
                    }
                }

                // 📸 อัปโหลดรูปภาพ
                const fd = new FormData(); fd.append('image', capturedBlob);
                const imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
                const imgData = await imgRes.json();
                if (!imgData.success) throw new Error("ImgErr");

                const nickname = getSmartVal(emp, 'ชื่อเล่น', 'Nickname') || "-";
                
                // 📝 บันทึกลงชีต
                await fetch(API_URL, { 
                    method: 'POST', mode: 'no-cors', cache: 'no-cache',
                    body: JSON.stringify({ 
                        action: type, empId: id, nickname: nickname, 
                        photo: imgData.data.url, status: status,
                        lateMinutes: lateMinutes, otHours: otHours,
                        location: userPos ? `${userPos.latitude.toFixed(6)},${userPos.longitude.toFixed(6)}` : "0" 
                    }) 
                });
                
                document.getElementById('res-name').innerText = nickname;
                document.getElementById('res-status').innerText = type === 'CHECK_IN' ? 'บันทึกเข้างานสำเร็จ' : 'บันทึกออกงานสำเร็จ';
                document.getElementById('res-detail').innerText = type === 'CHECK_IN' ? `${status} ${lateMinutes > 0 ? `(${lateMinutes} นาที)` : ""}\nเวลา: ${now.toLocaleTimeString('th-TH')}` : (otHours > 0 ? `OT: ${otHours} ชม.\nเวลา: ${now.toLocaleTimeString('th-TH')}` : `เลิกงานปกติ\nเวลา: ${now.toLocaleTimeString('th-TH')}`);
                document.getElementById('result-screen').classList.remove('hidden');

            } catch (e) { 
                console.error(e);
                showToast("❌ การเชื่อมต่อล้มเหลว กรุณาลองใหม่", "error"); 
                btn.disabled = false; btn.innerText = originalText;
            }
        }

        async function loginToHub() {
            const id = document.getElementById('admin-emp-id').value.trim().toUpperCase();
            const pin = document.getElementById('admin-pin').value.trim();
            const btn = document.getElementById('btn-login-hub');
            if(!id || !pin) return;
            btn.disabled = true; btn.innerText = "Checking...";
            try {
                const res = await fetch(`${API_URL}?action=GET_EMPLOYEES&t=${Date.now()}`);
                const emps = await res.json();
                const user = emps.find(e => String(getSmartVal(e, 'รหัสพนักงาน', 'Employee_ID') || "").toUpperCase() === id && String(getSmartVal(e, 'pin', 'PIN') || "") === pin);
                if (user) {
                    localStorage.setItem('user_role', String(getSmartVal(user, 'role', 'บทบาท') || "User")); 
                    localStorage.setItem('user_pos', String(getSmartVal(user, 'ตำแหน่ง', 'position') || "Staff"));
                    localStorage.setItem('user_name', String(getSmartVal(user, 'ชื่อเล่น', 'Nickname') || "Staff"));
                    showToast(`✨ ยินดีต้อนรับคุณ ${localStorage.getItem('user_name')}`);
                    setTimeout(() => window.location.href = 'Main_Hub.html', 1000);
                } else { showToast("❌ ข้อมูลไม่ถูกต้อง", "error"); btn.disabled = false; btn.innerText = "เข้าสู่ระบบ"; }
            } catch(e) { showToast("เชื่อมต่อข้อมูลล้มเหลว", "error"); btn.disabled = false; btn.innerText = "เข้าสู่ระบบ"; }
        }

        function showToast(m, t) { const el = document.getElementById('toast'); el.innerText = m; el.className = `fixed top-10 left-1/2 -translate-x-1/2 z-[1000] px-10 py-5 rounded-full shadow-2xl transition-all duration-500 font-bold text-center min-w-[300px] opacity-100 translate-y-0 ${t==='error'?'bg-rose-600 text-white':'bg-slate-900 text-white'}`; setTimeout(() => { if(el) el.classList.replace('opacity-100', 'opacity-0'); }, 4000); }
    </script>
</body>
</html>
